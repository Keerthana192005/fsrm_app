{% extends "layout.html" %}

{% block title %}Track Order - Campus Krishi{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-success text-white">
                    <h4 class="mb-0"><i class="fas fa-search"></i> Track Your Order</h4>
                </div>
                <div class="card-body">
                    <form method="GET" action="{{ url_for('track_order') }}">
                        <div class="mb-3">
                            <label for="order_id" class="form-label">Order ID</label>
                            <input type="number" class="form-control" id="order_id" name="order_id" required>
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label">Email Address</label>
                            <input type="email" class="form-control" id="email" name="email" required>
                        </div>
                        <button type="submit" class="btn btn-success w-100">
                            <i class="fas fa-search"></i> Track Order
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
